project_id = "prosavis-crm-whatsapp"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3001"
additional_redirect_urls = ["http://localhost:3001"]
jwt_expiry = 3600
enable_signup = true

[storage]
enabled = true
file_size_limit = "25MiB"

# verify_jwt = false porque las funciones ya validan el JWT internamente
# con requireCrmAdmin(). Si se deja true, el gateway de Supabase rechaza
# el preflight OPTIONS y rompe CORS.
